<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="Hivecode">
  <defs>
    <linearGradient id="spark" x1="8" y1="8" x2="92" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4285F4"/>
      <stop offset=".5" stop-color="#9B72CB"/>
      <stop offset="1" stop-color="#D96570"/>
    </linearGradient>
  </defs>
  <!-- three spiral arms converging clockwise into the cell -->
  <g stroke="url(#spark)" stroke-width="5.2" stroke-linecap="round">
    <g>
      <path d="M50 7 C 72 9 86 27 71 43"/>
      <circle cx="50" cy="7" r="3.4" fill="url(#spark)" stroke="none"/>
    </g>
    <g transform="rotate(120 50 50)">
      <path d="M50 7 C 72 9 86 27 71 43"/>
      <circle cx="50" cy="7" r="3.4" fill="url(#spark)" stroke="none"/>
    </g>
    <g transform="rotate(240 50 50)">
      <path d="M50 7 C 72 9 86 27 71 43"/>
      <circle cx="50" cy="7" r="3.4" fill="url(#spark)" stroke="none"/>
    </g>
  </g>
  <!-- the cell: one codebase everything converges on -->
  <polygon points="69,50 59.5,66.5 40.5,66.5 31,50 40.5,33.5 59.5,33.5" fill="url(#spark)"/>
</svg>
