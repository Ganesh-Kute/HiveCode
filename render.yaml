# Render deployment for the livecode relay.
# Render supports WebSockets on web services and has a free tier.
# Free tier sleeps after ~15 min idle — but server.js self-pings
# RENDER_EXTERNAL_URL every 10 min to KEEP IT WARM (no cold start). Render sets
# RENDER_EXTERNAL_URL automatically, so keep-warm activates on its own.
# For state that survives a restart, set HIVE_PERSIST_DIR to a mounted disk
# (paid) — without it, rooms live only in connected clients' memory.
services:
  - type: web
    name: livecode-relay
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      # - key: HIVE_PERSIST_DIR    # uncomment + attach a disk to persist rooms across restarts
      #   value: /var/data/hive
      # --- access control (RBAC Phase 1, opt-in) — see RBAC.md ---
      # - key: HIVE_AUTH_MODE      # 'required' gates every connection on a valid token
      #   value: required
      # - key: HIVE_JWT_SECRET     # HS256 shared secret (self-host); set as a Render secret
      #   sync: false
      # - key: HIVE_AUDIT_FILE     # append-only JSONL audit log (needs a mounted disk)
      #   value: /var/data/hive/audit.jsonl
